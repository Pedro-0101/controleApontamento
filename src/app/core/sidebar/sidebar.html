<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <lucide-icon name="clipboard-check" [size]="28"></lucide-icon>
      <span class="logo-text">Controle</span>
    </div>
    <button class="collapse-btn" (click)="toggleCollapse()" [title]="isCollapsed() ? 'Expandir menu' : 'Recolher menu'">
      <lucide-icon [name]="isCollapsed() ? 'chevron-right' : 'chevron-left'" [size]="16"></lucide-icon>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="nav-section-title">NAVEGAÇÃO</span>
      @for (item of menuItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [attr.data-tooltip]="item.label">
          <lucide-icon [name]="item.icon" [size]="20"></lucide-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-menu-container">
      @if (isMenuOpen()) {
        <div class="user-dropdown">
          <button (click)="logout()" class="dropdown-item logout">
            <lucide-icon name="log-out" [size]="16"></lucide-icon>
            <span class="nav-label">Sair do Sistema</span>
          </button>
        </div>
      }

      <div class="user-info" (click)="toggleMenu()" [class.active]="isMenuOpen()" [attr.data-tooltip]="userName() || 'Usuário'">
        <div class="user-avatar">
          <lucide-icon name="user" [size]="18"></lucide-icon>
        </div>
        <div class="user-details">
          <span class="user-name">{{ userName() }}</span>
          <div class="user-meta">
            <span class="user-status">Conectado</span>
            <div class="api-indicator" [class]="apiStatus()" [title]="'Tempo de resposta da API Ponto Certificado'">
              <lucide-icon name="activity" [size]="10"></lucide-icon>
              <span class="api-time">{{ responseTime() }}ms</span>
            </div>
          </div>
        </div>
        <lucide-icon name="chevron-up" [size]="16" class="menu-chevron" [class.rotated]="isMenuOpen()"></lucide-icon>
      </div>
    </div>
  </div>
</aside>
