<div class="filter-container">
  <div class="filters">
    <div class="filter-item">
      <label>Empresa</label>
      <app-multi-select-dropdown
        [options]="_empresasFiltroPainel()"
        [initialValue]="empresasSelecionadas()"
        labelProp="label"
        valueProp="value"
        placeholder="Todas"
        (selectionChange)="aoSelecionarEmpresa($event)"
        [disabled]="_isLoadingMarcacoesFiltroPainel()"
      ></app-multi-select-dropdown>
    </div>

    <div class="filter-item">
      <label>Status</label>
      <app-multi-select-dropdown
        [options]="_statusFiltroComContagem()"
        [initialValue]="statusSelecionados()"
        labelProp="label"
        valueProp="value"
        placeholder="Todos"
        (selectionChange)="aoSelecionarStatus($event)"
        [disabled]="_isLoadingMarcacoesFiltroPainel()"
      ></app-multi-select-dropdown>
    </div>

    <div class="filter-item">
      <label>Relógio</label>
      <app-multi-select-dropdown
        [options]="_relogiosFiltroPainel()"
        [initialValue]="relogiosSelecionados()"
        labelProp="label"
        valueProp="value"
        placeholder="Todos"
        (selectionChange)="aoSelecionarRelogio($event)"
        [disabled]="_isLoadingMarcacoesFiltroPainel()"
      ></app-multi-select-dropdown>
    </div>

    <div class="filter-item">
      <label>Filtros Especiais</label>
      <select
        class="input-select"
        [class.select-vazio]="filtroEspecialSelecionado() === ''"
        [value]="filtroEspecialSelecionado()"
        (change)="aoSelecionarFiltroEspecial($any($event.target).value)"
        [disabled]="_isLoadingMarcacoesFiltroPainel()"
      >
        <option value="">Nenhum</option>
        <option value="almoco_irregular">Almoço Irregular</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="btn btn-outline" (click)="limparFiltros()">
      <lucide-icon name="trash-2" [size]="16"></lucide-icon>
      Limpar Filtros
    </button>
  </div>
</div>
